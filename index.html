<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Dual YouTube Player</title>
    <style>
        .player-container { display: flex; gap: 20px; margin-top: 20px; }
        .controls { margin-top: 20px; }
    </style>
</head>
<body>
    <h2>ใส่ลิงก์ YouTube ที่ต้องการเปรียบเทียบ</h2>
    <div>
        <input type="text" id="url1" placeholder="ลิงก์เพลงที่ 1" style="width: 300px;">
        <input type="text" id="url2" placeholder="ลิงก์เพลงที่ 2" style="width: 300px;">
        <button onclick="loadVideos()">โหลดวิดีโอ</button>
    </div>

    <div class="controls">
        <button onclick="playBoth()">▶ Play Both</button>
        <button onclick="pauseBoth()">⏸ Pause Both</button>
        <button onclick="syncAndPlay()">🔄 Sync to 0:00 & Play</button>
    </div>

    <div class="player-container">
        <div id="player1"></div>
        <div id="player2"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
</body>
</html>
